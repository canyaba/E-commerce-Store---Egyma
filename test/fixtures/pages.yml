about:
  title: About Egyma
  slug: about
  body: |
    Egyma is a Winnipeg-based digital fitness marketplace that helps customers buy structured training, mobility, recovery, and nutrition resources online.

    The business has operated for four years and currently supports fitness professionals who sell practical digital programs to customers looking for convenient, well-organized guidance.
  published: true

